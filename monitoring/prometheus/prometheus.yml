global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi-health"
    metrics_path: /health
    static_configs:
      - targets: ["fastapi:8000"]

  - job_name: "openclaw-health"
    metrics_path: /health
    static_configs:
      - targets: ["openclaw-gateway:3500"]
