services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: fbr-leads-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=pg_cron"]
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fbr-leads-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw-gateway:
    image: node:20-alpine
    container_name: fbr-leads-openclaw
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      OPENCLAW_PORT: 3500
      OPENCLAW_WORKSPACE_ID: ${OPENCLAW_WORKSPACE_ID}
    command: ["node", "server.js"]
    ports:
      - "3500:3500"
    volumes:
      - ./openclaw:/app:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3500/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbr-leads-fastapi
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openclaw-gateway:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fbr-leads-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      fastapi:
        condition: service_healthy
    environment:
      SESSION_SECRET: ${SESSION_SECRET}
      APP_ENV: production
      BACKEND_URL: http://fastapi:8000
      DASHBOARD_EMAIL: ${DASHBOARD_EMAIL}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_USER_ID: ${DASHBOARD_USER_ID}
      DASHBOARD_WORKSPACE_ID: ${DASHBOARD_WORKSPACE_ID}
    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n:1.82.1
    container_name: fbr-leads-n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: http
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: fbr-leads-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      fastapi:
        condition: service_healthy
      openclaw-gateway:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fbr-leads-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: https://${APP_DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: fbr-leads-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy
      n8n:
        condition: service_started
      grafana:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/letsencrypt:ro

volumes:
  postgres_data:
  redis_data:
  grafana_data:
